<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mundo das Abelhas | Conhecendo a Vida</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="visual/style.css">
</head>
<body>
    <div id="bee-cursor">🐝</div>
    <div class="cursor-control">
        <span>Cursor Abelha</span>
        <label class="switch">
            <input type="checkbox" id="cursor-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="hero-container">
        <div class="parallax-bg" id="parallax-bg"></div>
        <div class="hero-content">
            <h1>Curiosidades <span>Fascinantes</span></h1>
            <div class="glass-box">
                <span>Você sabia?</span>
                <p id="curiosity-text">Explorando o universo das colmeias...</p>
            </div>
        </div>
    </div>

    <section class="stats-bar">
        <div class="stat-item"><h2>20.000+</h2><p>Espécies</p></div>
        <div class="stat-item"><h2>75%</h2><p>Dependência Alimentar</p></div>
        <div class="stat-item"><h2>80.000</h2><p>Abelhas por colmeia</p></div>
        <div class="stat-item"><h2>5 Milhões</h2><p>Flores p/ 1kg de mel</p></div>
    </section>

    <section class="curiosities-section">
        <h2>Curiosidades <span>Incríveis</span></h2>
        <div id="cards-grid" class="grid-container">
            </div>
    </section>

    <footer class="main-footer">
        © 2026 Mundo das Abelhas | Dev ANDRÉ A. LIBERATTO
    </footer>
    <script src="script/script.js"></script>
</body>
</html>
